(function(){
  window.storage = {
    get: function(key) {
      return new Promise(function(resolve, reject) {
        try {
          var val = localStorage.getItem('fin_' + key);
          if (val === null) reject(new Error('Key not found'));
          else resolve({ key: key, value: val });
        } catch(e) { reject(e); }
      });
    },
    set: function(key, value) {
      return new Promise(function(resolve, reject) {
        try {
          localStorage.setItem('fin_' + key, value);
          resolve({ key: key, value: value });
        } catch(e) { reject(e); }
      });
    },
    delete: function(key) {
      return new Promise(function(resolve) {
        localStorage.removeItem('fin_' + key);
        resolve({ key: key, deleted: true });
      });
    },
    list: function(prefix) {
      return new Promise(function(resolve) {
        var keys = [];
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          if (k && k.startsWith('fin_')) {
            var stripped = k.replace('fin_', '');

          }
        }
        resolve({ keys: keys });
      });
    }
  };

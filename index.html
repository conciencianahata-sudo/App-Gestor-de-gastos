<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App de Finanzas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f9f9f8; color: #1a1a1a; }
    body.dark { background: #141414; color: #F0B90B; }
    
    .container { max-width: 860px; margin: 0 auto; }
    .header { background: #fff; border-bottom: 1px solid #e8e6e1; padding: 0 20px; display: flex; align-items: center; height: 50px; position: relative; z-index: 200; gap: 14px; }
    .dark .header { background: #1e1e1e; border-bottom-color: #2e2e2e; }
    
    .menu-btn { border: none; background: none; cursor: pointer; padding: 6px 4px; display: flex; flex-direction: column; gap: 4px; }
    .menu-btn span { display: block; width: 18px; height: 1.5px; background: #1a1a1a; border-radius: 2px; }
    .dark .menu-btn span { background: #F0B90B; }
    
    .menu-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.18); z-index: 150; display: none; }
    .menu-backdrop.show { display: block; }
    .menu-sidebar { position: absolute; top: 50px; left: 0; width: 220px; background: #fff; border-right: 1px solid #e8e6e1; border-bottom: 1px solid #e8e6e1; border-radius: 0 0 10px 0; box-shadow: 4px 4px 20px rgba(0,0,0,0.18); padding: 8px 0; display: none; z-index: 160; }
    .menu-backdrop.show ~ .menu-sidebar { display: block; }
    .dark .menu-sidebar { background: #1e1e1e; border-color: #2e2e2e; }
    
    .menu-item { display: flex; align-items: center; gap: 12px; width: 100%; border: none; background: none; padding: 11px 20px; font-size: 14px; cursor: pointer; color: #9a9790; font-weight: 400; text-align: left; }
    .menu-item.active { background: #a0a09e; color: #1a1a1a; font-weight: 600; }
    .dark .menu-item.active { background: #3a3a3a; color: #F0B90B; }
    
    .tabs { background: #fff; border-bottom: 1px solid #e8e6e1; display: flex; overflow-x: auto; padding: 0 24px; }
    .dark .tabs { background: #1e1e1e; border-bottom-color: #2e2e2e; }
    .tab-btn { border: none; background: none; padding: 12px 16px; font-size: 13px; cursor: pointer; white-space: nowrap; color: #9a9790; font-weight: 400; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: #1a1a1a; font-weight: 500; border-bottom-color: #1a1a1a; }
    .dark .tab-btn { color: #8a6f0a; }
    .dark .tab-btn.active { color: #F0B90B; border-bottom-color: #F0B90B; }
    
    .content { padding: 16px 12px; }
    .card { background: #fff; border: 1px solid #e8e6e1; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .dark .card { background: #1e1e1e; border-color: #2e2e2e; }
    
    .btn { border: 1px solid #e8e6e1; border-radius: 6px; padding: 7px 14px; font-size: 13px; background: transparent; color: #1a1a1a; cursor: pointer; }
    .btn-primary { border: none; border-radius: 6px; padding: 8px 18px; font-size: 13px; background: #1a1a1a; color: #f9f9f8; cursor: pointer; font-weight: 500; }
    .dark .btn { border-color: #2e2e2e; color: #F0B90B; }
    .dark .btn-primary { background: #F0B90B; color: #141414; }
    
    .input { width: 100%; border: 1px solid #e8e6e1; border-radius: 6px; padding: 8px 10px; font-size: 13px; background: #fff; color: #1a1a1a; outline: none; }
    .dark .input { background: #252525; border-color: #2e2e2e; color: #F0B90B; }
    
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
    .modal-content { background: #fff; border-radius: 16px 16px 0 0; padding: 20px 16px 32px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 -4px 40px rgba(0,0,0,0.18); }
    .dark .modal-content { background: #1e1e1e; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script>
    // ===== ESTADO GLOBAL =====
    const LIGHT = {bg:"#f9f9f8",surface:"#ffffff",border:"#e8e6e1",text:"#1a1a1a",muted:"#9a9790",green:"#2d6a4f",red:"#b5392b",expense:"#e07b1a",blue:"#2c5f8a",accent:"#1a1a1a",cardBg:"#ffffff",inputBg:"#ffffff",btnBg:"transparent"};
    const DARK = {bg:"#141414",surface:"#1e1e1e",border:"#2e2e2e",text:"#F0B90B",muted:"#8a6f0a",green:"#4caf82",red:"#e05c4b",expense:"#e07b1a",blue:"#5b8fc9",accent:"#F0B90B",cardBg:"#1e1e1e",inputBg:"#252525",btnBg:"#2a2a2a"};
    
    const INIT = {
      currencies:[
        {id:"BOB",code:"BOB",name:"Boliviano",symbol:"Bs.",type:"fiat",rateToUSD:0.1449,color:"#2d6a4f",icon:"🇧🇴"},
        {id:"USD",code:"USD",name:"Dólar",symbol:"$",type:"fiat",rateToUSD:1,color:"#2c5f8a",icon:"🇺🇸"},
        {id:"USDT",code:"USDT",name:"Tether",symbol:"₮",type:"crypto",rateToUSD:1,color:"#2a7a7a",icon:"₮"},
        {id:"BTC",code:"BTC",name:"Bitcoin",symbol:"₿",type:"crypto",rateToUSD:107000,color:"#c47c1a",icon:"₿"},
      ],
      displayCurrency:"BOB",
      accounts:[],
      categories:[],
      transactions:[],
    };

    let state = JSON.parse(JSON.stringify(INIT));
    let theme = localStorage.getItem("fin_theme") || "light";
    let currentTab = "registro";
    let menuOpen = false;

    // ===== UTILIDADES =====
    const uid = () => Math.random().toString(36).slice(2,10);
    const today = () => new Date().toISOString().split("T")[0];
    
    const cvt = (amount, fromId, toId) => {
      if(fromId === toId) return amount;
      const from = state.currencies.find(c => c.id === fromId);
      const to = state.currencies.find(c => c.id === toId);
      if(!from || !to) return amount;
      return (amount * from.rateToUSD) / to.rateToUSD;
    };
    
    const fmt = (amount, curId) => {
      const cur = state.currencies.find(c => c.id === curId) || {symbol:"$",type:"fiat"};
      const dec = cur.type === "crypto" ? (Math.abs(amount) < 0.01 ? 8 : 4) : 2;
      return cur.symbol + Math.abs(amount).toLocaleString("es-MX", {minimumFractionDigits:dec, maximumFractionDigits:dec});
    };

    // ===== STORAGE =====
    const loadState = async () => {
      try {
        const result = await window.storage.get("fin7");
        if(result && result.value) {
          state = JSON.parse(result.value);
        }
      } catch(e) {}
      render();
    };

    const saveState = async () => {
      try {
        await window.storage.set("fin7", JSON.stringify(state));
      } catch(e) {}
    };

    // ===== RENDER PRINCIPAL =====
    const render = () => {
      const root = document.getElementById("root");
      const C = theme === "dark" ? DARK : LIGHT;
      
      root.innerHTML = `
        <div style="min-height:100vh;background:${C.bg};color:${C.text};" class="${theme === 'dark' ? 'dark' : ''}">
          <div class="header" style="background:${C.surface};border-bottom-color:${C.border};">
            <button class="menu-btn" onclick="toggleMenu()">
              <span></span><span></span><span></span>
            </button>
            <span style="font-weight:600;font-size:15px;">Finanzas</span>
            <div style="flex:1;"></div>
            <span style="font-size:12px;color:${C.muted};">Ver en</span>
            <select onchange="changeDisplayCurrency(this.value)" style="border:1px solid ${C.border};border-radius:5px;padding:4px 8px;font-size:13px;background:${C.inputBg};color:${C.text};cursor:pointer;">
              ${state.currencies.map(c => `<option value="${c.id}">${c.icon} ${c.code}</option>`).join('')}
            </select>
          </div>

          ${menuOpen ? `<div class="menu-backdrop show" onclick="toggleMenu()"></div>` : '<div class="menu-backdrop"></div>'}
          <div class="menu-sidebar" style="background:${C.surface};border-color:${C.border};">
            ${[{id:"cuentas",label:"Cuentas",icon:"🏦"},{id:"reportes",label:"Gráficos",icon:"📈"},{id:"categorias",label:"Categorías",icon:"🏷️"},{id:"ajustes",label:"Ajustes",icon:"⚙️"}]
              .map(item => `<button class="menu-item ${currentTab === item.id ? 'active' : ''}" onclick="switchTab('${item.id}')"><span style="font-size:16px;">${item.icon}</span>${item.label}</button>`)
              .join('')}
          </div>

          <div class="tabs" style="background:${C.surface};border-bottom-color:${C.border};">
            ${[{id:"registro",label:"Registro"},{id:"panel",label:"Panel"},{id:"divisas",label:"Divisas"}]
              .map(t => `<button class="tab-btn ${currentTab === t.id ? 'active' : ''}" onclick="switchTab('${t.id}')" style="border-bottom-color:${currentTab === t.id ? (theme === 'dark' ? '#F0B90B' : '#1a1a1a') : 'transparent'};color:${currentTab === t.id ? (theme === 'dark' ? '#F0B90B' : '#1a1a1a') : (theme === 'dark' ? '#8a6f0a' : '#9a9790')};">${t.label}</button>`)
              .join('')}
          </div>

          <div class="content">
            ${renderTab()}
          </div>
        </div>
      `;
    };

    const renderTab = () => {
      if(currentTab === "registro") return renderRegistro();
      if(currentTab === "panel") return renderPanel();
      if(currentTab === "divisas") return renderDivisas();
      if(currentTab === "cuentas") return renderCuentas();
      if(currentTab === "categorias") return renderCategorias();
      if(currentTab === "ajustes") return renderAjustes();
      return "<div>Tab no encontrado</div>";
    };

    const renderRegistro = () => {
      const C = theme === "dark" ? DARK : LIGHT;
      return `
        <div class="card" style="display:flex;gap:10px;">
          <button class="btn" onclick="setExpenseType('expense')" style="flex:1;">Gastos</button>
          <button class="btn" onclick="setExpenseType('income')" style="flex:1;">Ingresos</button>
        </div>
        <div class="card">
          <p style="color:${C.muted};">Este es el área de registro. Aquí va el formulario de transacciones.</p>
        </div>
      `;
    };

    const renderPanel = () => {
      const C = theme === "dark" ? DARK : LIGHT;
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Panel de Control</h2>
          <p>Balance total: ${fmt(0, state.displayCurrency)}</p>
        </div>
      `;
    };

    const renderDivisas = () => {
      const C = theme === "dark" ? DARK : LIGHT;
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Divisas</h2>
          ${state.currencies.map(cur => `
            <div style="padding:10px 0;border-bottom:1px solid ${C.border};">
              <strong>${cur.name} (${cur.code})</strong> - ${cur.icon}
            </div>
          `).join('')}
        </div>
      `;
    };

    const renderCuentas = () => {
      const C = theme === "dark" ? DARK : LIGHT;
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Cuentas</h2>
          <p style="color:${C.muted};">Sin cuentas creadas aún.</p>
        </div>
      `;
    };

    const renderCategorias = () => {
      const C = theme === "dark" ? DARK : LIGHT;
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Categorías</h2>
          <p style="color:${C.muted};">Sin categorías creadas aún.</p>
        </div>
      `;
    };

    const renderAjustes = () => {
      const C = theme === "dark" ? DARK : LIGHT;
      return `
        <div class="card">
          <h2 style="margin-bottom:20px;">Ajustes</h2>
          <label style="display:flex;gap:10px;margin-bottom:15px;cursor:pointer;align-items:center;">
            <input type="checkbox" ${theme === 'dark' ? 'checked' : ''} onchange="toggleTheme()" style="cursor:pointer;"/>
            <span>Tema oscuro</span>
          </label>
          <button class="btn-primary" onclick="exportData()" style="margin-top:10px;">⬇ Exportar datos</button>
        </div>
      `;
    };

    // ===== FUNCIONES DE CONTROL =====
    window.toggleMenu = () => {
      menuOpen = !menuOpen;
      render();
    };

    window.switchTab = (tabId) => {
      currentTab = tabId;
      menuOpen = false;
      render();
    };

    window.changeDisplayCurrency = (curId) => {
      state.displayCurrency = curId;
      saveState();
      render();
    };

    window.setExpenseType = (type) => {
      // TODO: Expandir lógica
      render();
    };

    window.toggleTheme = () => {
      theme = theme === 'light' ? 'dark' : 'light';
      localStorage.setItem("fin_theme", theme);
      document.body.className = theme === 'dark' ? 'dark' : '';
      render();
    };

    window.exportData = () => {
      const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "finanzas_backup.json";
      a.click();
      URL.revokeObjectURL(url);
    };

    // ===== INICIALIZAR =====
    loadState();
  </script>
</body>
</html>
